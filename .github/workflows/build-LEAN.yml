name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      kernel_version:
        description: 'Kernel version (leave empty for auto)'
        required: false
        default: ''

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240  # 4小时超时保护

    steps:
    - name: Check machine configuration
      run: |
        echo "=========================================="
        echo "N1 OpenWRT 编译环境检查"
        echo "=========================================="
        echo "CPU 信息:"
        nproc
        echo "内存信息:"
        free -h
        echo "磁盘信息(清理前):"
        df -hT
        echo "=========================================="

    - name: Free disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 5120
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        remove-swap: 'false'

    - name: Check disk after cleanup
      run: |
        echo "=========================================="
        echo "磁盘信息(清理后)"
        echo "=========================================="
        df -hT
        echo "=========================================="
        
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Cache APT packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev python3-pip python3-setuptools python-is-python3 libfuse-dev rename gn file
        version: 1.0
        execute_install_scripts: true

    - name: Initialize environment
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        echo "Environment initialized successfully"

    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        sed -i 's|https://github.com/coolsnowwolf/luci.git;openwrt-23.05|https://github.com/coolsnowwolf/luci|g' feeds.conf.default
        echo "Source code cloned successfully"

    - name: Cache OpenWRT build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: n1-${{ env.REPO_BRANCH }}-${{ hashFiles('N1-LEDE/.config') }}
        prefix: ${{ github.workspace }}/openwrt
        
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "Feeds updated and installed"

    - name: Load custom config
      run: |
        [ -e $FILES ] && cp -r $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        if [ -f $DIY_SH ]; then
          chmod +x $DIY_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_SH
        fi
        echo "Custom config loaded"

    - name: SSH connection to Actions (Debug)
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'
      with:
        password: ''

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        echo "Downloading packages..."
        make download -j4
        # 检查并删除无效的下载文件
        find dl -size -1024c -exec rm -f {} \;
        echo "Package download completed"

    - name: Compile the firmware
      run: |
        cd openwrt
        # 获取CPU核心数并限制并行任务
        TOTAL_CORES=$(nproc)
        if [ $TOTAL_CORES -gt 2 ]; then
          JOBS=2
        else
          JOBS=$TOTAL_CORES
        fi
        
        echo "=========================================="
        echo "开始编译 N1 OpenWRT"
        echo "CPU核心数: $TOTAL_CORES"
        echo "并行任务数: $JOBS"
        echo "=========================================="
        
        # 尝试编译，失败时降级到单任务并输出详细日志
        make -j$JOBS || make -j1 V=s
        
        if [ -f bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz ]; then
          echo "compile_status=success" >> $GITHUB_ENV
          echo "编译成功！"
        else
          echo "compile_status=failed" >> $GITHUB_ENV
          echo "编译失败，请检查日志"
          exit 1
        fi

    - name: Package OpenWrt Firmware
      if: env.compile_status == 'success'
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_VERSION_NAME: ${{ github.event.inputs.kernel_version != '' && github.event.inputs.kernel_version || '5.15.176' }}
        KERNEL_AUTO_LATEST: ${{ github.event.inputs.kernel_version == '' && 'true' || 'false' }}
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0
       
    - name: Set packaged status
      if: env.compile_status == 'success'
      run: |
        echo "PACKAGED_STATUS=success" >> $GITHUB_ENV
        echo "PACKAGED_OUTPUTDATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: env.PACKAGED_STATUS == 'success'
      with:
        tag: OpenWrt_N1_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## N1 OpenWRT 固件自动编译
          
          ### 固件信息
          - 基于 Lean's LEDE 源码编译
          - 目标设备：Phicomm N1 (S905D)
          - 内核版本：${{ github.event.inputs.kernel_version || '5.15.176' }}
          - 编译时间：${{ env.PACKAGED_OUTPUTDATE }}
          
          ### 使用说明
          - **IP地址**: 192.168.2.2
          - **用户名**: root
          - **密码**: password
          
          ### 注意事项
          - 首次使用建议全新刷写
          - 如遇问题请检查配置是否正确
          
          ### 编译状态
          - ✅ 编译成功
          - 📦 已打包为可刷写镜像
          
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 8
        delete_tags: true
        delete_tag_pattern: 'OpenWrt_N1_*'
        
    - name: Upload debug logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-build-logs
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/bin/targets/*/*/*.log
        retention-days: 7
        
    - name: Build summary
      if: always()
      run: |
        echo "=========================================="
        if [ "${{ env.compile_status }}" = "success" ]; then
          echo "✅ N1 OpenWRT 固件编译成功！"
          echo "📦 固件已上传到 Releases"
          echo "=========================================="
        else
          echo "❌ N1 OpenWRT 固件编译失败"
          echo "📁 调试日志已保存，请检查"
          echo "=========================================="
        fi
