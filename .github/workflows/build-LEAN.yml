name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      kernel_version:
        description: 'Kernel version (leave empty for auto)'
        required: false
        default: ''

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Check machine configuration
      run: |
        echo "=========================================="
        echo "N1 OpenWRT 编译环境检查"
        echo "=========================================="
        echo "CPU 信息:"
        nproc
        echo "内存信息:"
        free -h
        echo "磁盘信息(清理前):"
        df -hT
        echo "=========================================="

    - name: Free disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 5120
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        remove-swap: 'false'

    - name: Check disk after cleanup
      run: |
        echo "=========================================="
        echo "磁盘信息(清理后)"
        echo "=========================================="
        df -hT
        echo "=========================================="
        
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Cache APT packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip time rsync python3 python3-dev python3-pip python3-setuptools python-is-python3 libfuse-dev rename gn file
        version: 1.0
        execute_install_scripts: true

    - name: Initialize environment
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        echo "Environment initialized successfully"

    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        sed -i 's|https://github.com/coolsnowwolf/luci.git;openwrt-23.05|https://github.com/coolsnowwolf/luci|g' feeds.conf.default
        echo "Source code cloned successfully"

    - name: Cache OpenWRT build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: n1-${{ env.REPO_BRANCH }}-${{ hashFiles('N1-LEDE/.config') }}
        prefix: ${{ github.workspace }}/openwrt
        
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "Feeds updated and installed"

    - name: Load custom config
      run: |
        [ -e $FILES ] && cp -r $FILES openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        if [ -f $DIY_SH ]; then
          chmod +x $DIY_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_SH
        fi
        echo "Custom config loaded"

    - name: SSH connection to Actions (Debug)
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        echo "Downloading packages..."
        make download -j4
        find dl -size -1024c -exec rm -f {} \;
        echo "Package download completed"

    - name: Compile the firmware
      run: |
        cd openwrt
        echo "=========================================="
        echo "开始编译 N1 OpenWRT (单线程模式)"
        echo "=========================================="
        
        # 使用单线程编译，避免内存不足导致静默失败
        make -j1 V=s
        
        # 检查编译结果
        if ls bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz 2>/dev/null; then
          echo "compile_status=success" >> $GITHUB_ENV
          echo "✅ 编译成功"
          echo "编译产物列表:"
          ls -la bin/targets/*/*/
        else
          echo "compile_status=failed" >> $GITHUB_ENV
          echo "❌ 编译失败"
          echo "尝试查找任何生成的固件..."
          find bin/targets/ -name "*.gz" -o -name "*.img" 2>/dev/null || echo "没有找到任何固件"
          exit 1
        fi

    - name: Package firmware for N1
      if: env.compile_status == 'success'
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_VERSION_NAME: ${{ github.event.inputs.kernel_version != '' && github.event.inputs.kernel_version || '5.15.176' }}
        KERNEL_AUTO_LATEST: ${{ github.event.inputs.kernel_version == '' && 'true' || 'false' }}
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0

    - name: Verify and set package status
      if: env.compile_status == 'success'
      run: |
        echo "检查打包产物..."
        
        # 检查多个可能的路径
        if [ -d "/opt/openwrt_packit/output" ]; then
          echo "找到打包目录:"
          ls -la /opt/openwrt_packit/output/
          
          FILE_COUNT=$(ls -1 /opt/openwrt_packit/output/*.img* 2>/dev/null | wc -l)
          if [ $FILE_COUNT -gt 0 ]; then
            echo "✅ 打包成功，找到 $FILE_COUNT 个固件文件"
            echo "PACKAGED_STATUS=success" >> $GITHUB_ENV
            echo "PACKAGED_OUTPUTDATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          else
            echo "⚠️ 打包目录存在但没有固件文件"
            echo "尝试查找编译目录中的固件..."
            find openwrt/bin/targets/ -name "*.img*" -o -name "*.gz" | head -10
          fi
        else
          echo "❌ 打包目录不存在: /opt/openwrt_packit/output"
          echo "尝试查找编译目录中的固件作为备选..."
          find openwrt/bin/targets/ -name "*.img*" -o -name "*.gz" | head -10
          
          # 如果编译目录中有固件，直接使用
          if ls openwrt/bin/targets/*/*/openwrt-*.img.gz 2>/dev/null; then
            echo "找到编译目录中的固件，将直接上传"
            mkdir -p /opt/openwrt_packit/output/
            cp openwrt/bin/targets/*/*/openwrt-*.img* /opt/openwrt_packit/output/
            echo "PACKAGED_STATUS=success" >> $GITHUB_ENV
            echo "PACKAGED_OUTPUTDATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          elif ls openwrt/bin/targets/*/*/*.tar.gz 2>/dev/null; then
            echo "找到编译目录中的 tar.gz 文件，将直接上传"
            mkdir -p /opt/openwrt_packit/output/
            cp openwrt/bin/targets/*/*/*.tar.gz /opt/openwrt_packit/output/
            echo "PACKAGED_STATUS=success" >> $GITHUB_ENV
            echo "PACKAGED_OUTPUTDATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          else
            echo "❌ 编译目录中也没有找到固件文件"
            echo "openwrt/bin/targets/ 目录内容:"
            ls -la openwrt/bin/targets/ 2>/dev/null || echo "目录不存在"
          fi
        fi

    - name: Upload firmware to Release
      uses: ncipollo/release-action@main
      if: env.PACKAGED_STATUS == 'success'
      with:
        tag: OpenWrt_N1_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## N1 OpenWRT 固件
          
          ### 固件信息
          - 基于 Lean's LEDE 源码编译
          - 目标设备：Phicomm N1 (S905D)
          - 内核版本：${{ github.event.inputs.kernel_version || '5.15.176' }}
          - 编译时间：${{ env.PACKAGED_OUTPUTDATE }}
          
          ### 默认设置
          - **IP地址**: 192.168.2.2
          - **用户名**: root
          - **密码**: password
          
          ### 使用说明
          - 首次使用建议全新刷写
          - 下载后解压得到刷机镜像
          
          ### 编译状态
          - ✅ 编译成功
          - 📦 已打包为可刷写镜像

    # 备选方案1：如果 Release 上传失败，保存为 Artifact
    - name: Fallback - Save as Artifact
      if: failure() && env.compile_status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware-${{ github.run_number }}
        path: |
          /opt/openwrt_packit/output/*.img*
          openwrt/bin/targets/*/*/*.img*
          openwrt/bin/targets/*/*/*.tar.gz
        retention-days: 90
        
    # 备选方案2：如果编译失败，保存 .config 和关键日志
    - name: Fallback - Save debug files
      if: failure()
      run: |
        # 创建日志目录，避免 upload-artifact 报错
        mkdir -p openwrt/logs
        # 如果有编译日志，复制过来
        find openwrt -name "*.log" -exec cp {} openwrt/logs/ \; 2>/dev/null || true
        # 保存 .config 文件
        cp openwrt/.config openwrt/logs/config.backup 2>/dev/null || true
        echo "调试文件已准备"
        
    - name: Upload debug files
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-debug-${{ github.run_number }}
        path: |
          openwrt/logs/
          openwrt/.config
        retention-days: 7
        
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.PACKAGED_STATUS == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 8
        delete_tags: true
        delete_tag_pattern: 'OpenWrt_N1_*'
        
    - name: Build summary
      if: always()
      run: |
        echo "=========================================="
        if [ "${{ env.compile_status }}" = "success" ]; then
          if [ "${{ env.PACKAGED_STATUS }}" = "success" ]; then
            echo "✅ N1 OpenWRT 固件编译并打包成功！"
            echo "📦 固件已上传到 Releases"
          else
            echo "⚠️ 编译成功但打包失败"
            echo "📁 固件文件已保存到 Artifacts"
          fi
        else
          echo "❌ N1 OpenWRT 固件编译失败"
          echo "📁 调试文件已保存到 Artifacts"
        fi
        echo "=========================================="
        echo "编译时间: $(date)"
        echo "运行编号: ${{ github.run_number }}"
        echo "=========================================="
